<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="20" fill="url(#g)"/>
  <!-- Left vertical bar of N -->
  <rect x="14" y="16" width="17" height="68" rx="2" fill="white"/>
  <!-- Right vertical bar of N -->
  <rect x="69" y="16" width="17" height="68" rx="2" fill="white"/>
  <!-- Diagonal stroke of N (top-right of left bar → bottom-left of right bar) -->
  <polygon points="30,16 47,16 70,84 53,84" fill="white"/>
</svg>
